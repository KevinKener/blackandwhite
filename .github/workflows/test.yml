name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  integration:
    name: Integration tests (RLS + points)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Start Supabase local
        run: supabase start

      - name: Apply migrations
        run: supabase db reset --no-confirm

      - name: Install dependencies
        run: bun install --cwd tests

      - name: Run integration tests
        run: bun run --cwd tests test
        env:
          SUPABASE_URL: http://localhost:54321
          SUPABASE_ANON_KEY: ${{ steps.supabase.outputs.anon_key || 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZS1kZW1vIiwicm9sZSI6ImFub24iLCJleHAiOjE5ODM4MTI5OTZ9.CRFA0NiK7kyqHPIX1_hZ7LHyFiRIOc_fzpGqIx4P0ME' }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ steps.supabase.outputs.service_role_key || 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZS1kZW1vIiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImV4cCI6MTk4MzgxMjk5Nn0.EGIM96RAZx35lJzdJsyH-qQwv8Hj04zWl196z2-SBc0' }}

  e2e:
    name: E2E tests (Playwright)
    runs-on: ubuntu-latest
    # E2E requires ADMIN_EMAIL/PASSWORD set as repository secrets.
    # Skip if secrets are not configured (open PRs from forks).
    if: ${{ secrets.ADMIN_EMAIL != '' }}

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Start Supabase local
        run: supabase start

      - name: Apply migrations + seed admin user
        run: |
          supabase db reset --no-confirm
          supabase db execute --file .github/seed-e2e.sql

      - name: Install dependencies
        run: |
          bun install
          bun run --cwd tests exec playwright install chromium --with-deps

      - name: Build and start servers
        run: |
          bun run build
          bun run --cwd server start &
          bun run --cwd client/admin preview --port 5173 &
          bun run --cwd client/customer preview --port 5174 &
          npx wait-on http://localhost:3000/health http://localhost:5173 http://localhost:5174
        env:
          SUPABASE_URL: http://localhost:54321
          SUPABASE_ANON_KEY: ${{ steps.supabase.outputs.anon_key || 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZS1kZW1vIiwicm9sZSI6ImFub24iLCJleHAiOjE5ODM4MTI5OTZ9.CRFA0NiK7kyqHPIX1_hZ7LHyFiRIOc_fzpGqIx4P0ME' }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ steps.supabase.outputs.service_role_key || 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZS1kZW1vIiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImV4cCI6MTk4MzgxMjk5Nn0.EGIM96RAZx35lJzdJsyH-qQwv8Hj04zWl196z2-SBc0' }}
          VITE_SUPABASE_URL: http://localhost:54321
          VITE_SUPABASE_ANON_KEY: ${{ steps.supabase.outputs.anon_key || '' }}
          VITE_API_URL: http://localhost:3000
          VITE_CUSTOMER_PWA_URL: http://localhost:5174

      - name: Run E2E tests
        run: bun run --cwd tests test:e2e
        env:
          CI: true
          SUPABASE_URL: http://localhost:54321
          SUPABASE_SERVICE_ROLE_KEY: ${{ steps.supabase.outputs.service_role_key || 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZS1kZW1vIiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImV4cCI6MTk4MzgxMjk5Nn0.EGIM96RAZx35lJzdJsyH-qQwv8Hj04zWl196z2-SBc0' }}
          SUPABASE_ANON_KEY: ${{ steps.supabase.outputs.anon_key || '' }}
          ADMIN_EMAIL: ${{ secrets.ADMIN_EMAIL }}
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
          ADMIN_URL: http://localhost:5173
          CUSTOMER_URL: http://localhost:5174

      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: tests/playwright-report/
          retention-days: 7
